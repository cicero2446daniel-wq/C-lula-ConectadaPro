<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Célula Pro v5.5 - Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0b0b; --gold: #c5a059; --card: #161616; --text: #f0f0f0; --input: #252525; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: auto; background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; box-sizing: border-box; }
        
        h1 { color: var(--gold); text-align: center; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        
        textarea { width: 100%; padding: 18px; background: var(--input); color: white; border: 1px solid #444; border-radius: 12px; margin-bottom: 15px; font-size: 18px; outline: none; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--gold); }
        
        .btn-gerar { width: 100%; padding: 22px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-gerar:active { transform: scale(0.98); }
        .btn-gerar:disabled { background: #444; color: #888; }

        /* Roteiro Otimizado para Leitura (Fonte 19px como no seu modelo) */
        #roteiro { margin-top: 25px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 5px solid var(--gold); line-height: 1.8; font-size: 19px; color: #ddd; white-space: pre-wrap; }
        #roteiro b { color: var(--gold); font-weight: 700; }

        .settings-btn { position: absolute; top: 20px; right: 20px; color: var(--gold); cursor: pointer; font-size: 20px; z-index: 10; }
        #config-panel { display: none; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed var(--gold); animation: fadeIn 0.3s; }
        
        .history-section { margin-top: 35px; max-width: 600px; margin: auto; border-top: 1px solid #333; padding-top: 20px; }
        .history-item { background: #1a1a1a; padding: 18px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .history-item:hover { border-color: var(--gold); }
        .badge { background: var(--gold); color: black; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="inicializarApp()">

<div class="container">
    <i class="fa-solid fa-cog settings-btn" onclick="toggleConfig()"></i>
    <h1><i class="fa-solid fa-leaf"></i> Célula Pro</h1>
    <p style="text-align: center; font-size: 14px; color: #888; margin-bottom: 20px;">Líder: Cicero Daniel</p>

    <div id="config-panel">
        <label style="font-size: 12px; color: var(--gold); font-weight: bold;">CHAVE API GEMINI:</label>
        <input type="password" id="api-key-input" style="width: 100%; background: #000; color: #00ff00; border: 1px solid #444; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box;" placeholder="Cole sua chave aqui...">
        <button onclick="saveKey()" style="margin-top: 10px; width: 100%; background: var(--gold); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">SALVAR CHAVE</button>
    </div>
    
    <textarea id="tema" placeholder="Qual o tema ou versículo de hoje?" rows="3"></textarea>
    
    <button id="btn-main" class="btn-gerar" onclick="gerarEncontro()">
        <i class="fa-solid fa-bolt"></i> GERAR ROTEIRO PREMIUM
    </button>

    <div id="roteiro">O roteiro claro e objetivo aparecerá aqui...</div>
</div>

<div class="history-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="color: var(--gold); font-weight: bold;"><i class="fa-solid fa-clock-rotate-left"></i> SALVOS RECENTEMENTE</span>
        <button onclick="limparHistorico()" style="background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 12px;">LIMPAR</button>
    </div>
    <div id="lista-historico"></div>
</div>

<script>
let MINHA_CHAVE = localStorage.getItem('celulapro_key') || "";

function toggleConfig() {
    const panel = document.getElementById('config-panel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

function saveKey() {
    const k = document.getElementById('api-key-input').value;
    if(k.trim() !== "") {
        localStorage.setItem('celulapro_key', k);
        MINHA_CHAVE = k;
        alert("Configuração salva!");
        toggleConfig();
        location.reload();
    }
}

function inicializarApp() {
    atualizarInterfaceHistorico();
    if(!MINHA_CHAVE) {
        document.getElementById('roteiro').innerHTML = "<div style='color: orange; text-align: center;'>⚠️ Olá, Cícero! Configure sua chave API na engrenagem para começar.</div>";
    }
}

async function gerarEncontro() {
    const tema = document.getElementById('tema').value;
    const display = document.getElementById('roteiro');
    const btn = document.getElementById('btn-main');

    if(!MINHA_CHAVE) { alert("Configure sua chave API primeiro!"); toggleConfig(); return; }
    if(!tema) return alert("Insira um tema!");

    btn.disabled = true;
    display.innerHTML = "Criando roteiro objetivo... <i class='fa-solid fa-circle-notch fa-spin'></i>";

    // Prompt fundindo sua personalidade com a inteligência do Gemini
    const instrucao = `Atue como um mentor de líderes de célula cristã experiente, simulando o estilo do Cicero Daniel. 
    Crie um roteiro de célula de 60 minutos sobre: "${tema}".
    Seja claro, direto ao ponto e use uma linguagem simples para falar e ouvir.
    Estrutura:
    1. Quebra-gelo: Uma pergunta ou dinâmica rápida.
    2. Louvor: 2 músicas que conectam com o tema.
    3. Palavra: 3 pontos curtos. Vá direto ao texto bíblico e à explicação.
    4. Aplicação: O que fazer amanhã?
    5. Oração: Motivo específico.
    Use emojis e evite textos longos ou cansativos.`;

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${MINHA_CHAVE}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: instrucao }] }] })
        });

        const data = await response.json();
        const textoOriginal = data.candidates[0].content.parts[0].text;
        
        // Formatação simples para negritos e quebras de linha
        const textoFormatado = textoOriginal.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

        display.innerHTML = `
            <div style="text-align:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--gold); font-size: 24px;">${tema.toUpperCase()}</h2>
                <p style="margin:5px 0; font-size: 14px;">Líder: Cicero Daniel</p>
            </div>
            <hr style="border-top:1px solid #333; margin-bottom:20px;">
            ${textoFormatado}`;

        salvarNoHistorico(tema.toUpperCase(), display.innerHTML);
    } catch (e) {
        display.innerHTML = "❌ Erro na conexão. Verifique sua chave ou internet.";
    } finally {
        btn.disabled = false;
    }
}

function salvarNoHistorico(t, c) {
    const h = JSON.parse(localStorage.getItem('hist_celula_v5') || '[]');
    const data = new Date().toLocaleDateString('pt-BR');
    h.unshift({ titulo: t, conteudo: c, data: data });
    if(h.length > 10) h.pop();
    localStorage.setItem('hist_celula_v5', JSON.stringify(h));
    atualizarInterfaceHistorico();
}

function atualizarInterfaceHistorico() {
    const div = document.getElementById('lista-historico');
    const h = JSON.parse(localStorage.getItem('hist_celula_v5') || '[]');
    div.innerHTML = h.map((item, idx) => `
        <div class="history-item" onclick="verHistorico(${idx})">
            <span class="badge">${item.data}</span><br>
            <strong style="color:var(--gold); font-size:18px;">${item.titulo}</strong>
        </div>
    `).join('');
}

function verHistorico(i) {
    const h = JSON.parse(localStorage.getItem('hist_celula_v5') || '[]');
    document.getElementById('roteiro').innerHTML = h[i].conteudo;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function limparHistorico() {
    if(confirm("Apagar histórico?")) { localStorage.removeItem('hist_celula_v5'); atualizarInterfaceHistorico(); }
}
</script>
</body>
</html>
